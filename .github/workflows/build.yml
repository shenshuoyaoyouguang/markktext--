name: Build

on:
  push:
    branches: [ main, master, develop ]
    paths-ignore:
      - 'docs/**'
  pull_request:
    branches: [ main, master, develop ]
    paths-ignore:
      - 'docs/**'

jobs:
  unix:
    runs-on: ${{ matrix.os }}
    continue-on-error: false
    timeout-minutes: 45

    strategy:
      matrix:
        os: [macos-14, ubuntu-latest]

    env:
      DISPLAY: ":99.0"
      # MARKTEXT_IS_STABLE: 1
      MARKTEXT_EXIT_ON_ERROR: 1
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CI: "true"

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 16
          check-latest: true
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install build dependencies
        if: runner.os == 'Linux'
        #                         electron-builder                 | keyboard-layout         | keytar                      | fontmanager
        run: |
          sudo apt-get -y update
          sudo apt-get install -y icnsutils graphicsmagick xz-utils libx11-dev libxkbfile-dev gnome-keyring libsecret-1-dev libfontconfig-dev

      - name: Install Python for node-gyp (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install python@3.11
          echo "/opt/homebrew/opt/python@3.11/libexec/bin" >> $GITHUB_PATH
          ln -sf /opt/homebrew/opt/python@3.11/libexec/bin/python3.11 /usr/local/bin/python3

      - name: Cache node_modules
        uses: actions/cache@v5
        id: cacheNodeModules
        with:
          path: ${{ github.workspace }}/node_modules
          key: ${{ runner.os }}-node_modules-cache-v1-${{ hashFiles(format('{0}{1}', github.workspace, '/yarn.lock')) }}
          restore-keys: |
            ${{ runner.os }}-node_modules-cache-v1-

      - name: Cache Electron
        uses: actions/cache@v5
        with:
          path: ${{ env.HOME }}/.cache/electron
          key: ${{ runner.os }}-electron-cache-v1-${{ hashFiles(format('{0}{1}', github.workspace, '/yarn.lock')) }}

      - name: Cache Electron-Builder
        uses: actions/cache@v5
        with:
          path: ${{ env.HOME }}/.cache//electron-builder
          key: ${{ runner.os }}-electron-builder-cache-v1-${{ hashFiles(format('{0}{1}', github.workspace, '/yarn.lock')) }}

      - name: Install dependencies
        if: ${{ steps.cacheNodeModules.outputs.cache-hit != 'true' }}
        run: yarn install --check-files --frozen-lockfile

      - name: Lint
        run: |
          yarn run lint
          yarn run validate-licenses

      - name: Run unit and E2E tests (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a yarn run test

      - name: Run unit and E2E tests (macOS)
        if: runner.os == 'macOS'
        run: yarn run test

      - name: Build
        run: yarn build:bin

  windows:
    name: windows (${{ matrix.windows_runner }})
    runs-on: ${{ matrix.windows_runner }}
    continue-on-error: false
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        windows_runner: [windows-latest, windows-2022]

    env:
      # MARKTEXT_IS_STABLE: 1
      MARKTEXT_EXIT_ON_ERROR: 1
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CI: "true"

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 16
          check-latest: true
          cache: yarn
          cache-dependency-path: yarn.lock

      # Workaround: Fix native build failure due to outdated node-gyp version.
      - name: Install Visual Studio Build Tools
        run: |
          choco install visualstudio2022-workload-vctools --package-parameters "--includeRecommended"
        shell: pwsh

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '17.0'

      - name: Fix node-gyp
        run: |
          npm install --global node-gyp@10
          npm prefix -g | % {npm config set node_gyp "$_\node_modules\node-gyp\bin\node-gyp.js"}
          node-gyp install
        shell: pwsh
        env:
          GYP_MSVS_VERSION: 2022
          npm_config_msvs_version: 2022

      - name: Cache Electron
        uses: actions/cache@v5
        with:
          path: ${{ env.LOCALAPPDATA }}\electron\Cache
          key: ${{ matrix.windows_runner }}-electron-cache-v2-${{ hashFiles(format('{0}{1}', github.workspace, '\yarn.lock')) }}

      - name: Cache Electron-Builder
        uses: actions/cache@v5
        with:
          path: ${{ env.LOCALAPPDATA }}\electron-builder\cache
          key: ${{ matrix.windows_runner }}-electron-builder-cache-v2-${{ hashFiles(format('{0}{1}', github.workspace, '\yarn.lock')) }}

      - name: Install dependencies
        # Do not cache node_modules on Windows. The build/rebuild pipeline can
        # mutate native addons (for example keytar/ced), and restoring a stale
        # node_modules cache makes startup regressions extremely hard to reason about.
        run: yarn install --check-files --frozen-lockfile

      - name: Prepare Windows diagnostics workspace
        run: |
          Remove-Item -Recurse -Force test-artifacts -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force test-artifacts\runner-env | Out-Null
        shell: pwsh

      - name: Capture Windows runner environment
        run: |
          $runnerInfo = [ordered]@{
            requestedRunner = '${{ matrix.windows_runner }}'
            imageOs = $env:ImageOS
            imageVersion = $env:ImageVersion
            osVersion = [System.Environment]::OSVersion.VersionString
            nodeVersion = node --version
            npmVersion = npm --version
            yarnVersion = yarn --version
            localAppData = $env:LOCALAPPDATA
            temp = $env:TEMP
            tmp = $env:TMP
            electronCachePath = Join-Path $env:LOCALAPPDATA 'electron\Cache'
            electronBuilderCachePath = Join-Path $env:LOCALAPPDATA 'electron-builder\cache'
          }
          $runnerInfo | ConvertTo-Json -Depth 5 | Set-Content test-artifacts\runner-env\runner-info.json
          Get-ChildItem Env:* | Sort-Object Name | Out-String | Set-Content test-artifacts\runner-env\environment.txt
          Get-CimInstance Win32_OperatingSystem | Select-Object Caption, Version, BuildNumber | ConvertTo-Json | Set-Content test-artifacts\runner-env\os-info.json
          Get-ChildItem node_modules -Recurse -Filter *.node | Select-Object FullName, Length | Format-Table -AutoSize | Out-String | Set-Content test-artifacts\runner-env\native-modules.txt
          Get-ChildItem node_modules\ced -Recurse | Select-Object FullName, Length | Format-Table -AutoSize | Out-String | Set-Content test-artifacts\runner-env\ced-tree.txt
        shell: pwsh

      - name: Rebuild startup native modules for Electron ABI
        id: rebuild_startup_native
        continue-on-error: true
        run: |
          $logPath = 'test-artifacts\runner-env\rebuild-startup-native.log'
          & yarn run rebuild:startup-native *>&1 | Tee-Object -FilePath $logPath
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
        shell: pwsh
        env:
          GYP_MSVS_VERSION: 2022
          npm_config_msvs_version: 2022

      - name: Record native rebuild outcome
        if: always()
        run: |
          $result = [ordered]@{
            runner = '${{ matrix.windows_runner }}'
            outcome = '${{ steps.rebuild_startup_native.outcome }}'
            conclusion = '${{ steps.rebuild_startup_native.conclusion }}'
          }
          $result | ConvertTo-Json -Depth 3 | Set-Content test-artifacts\runner-env\rebuild-startup-native-result.json
        shell: pwsh

      - name: Lint
        run: |
          yarn run lint
          yarn run validate-licenses

      - name: Exclude workspace from Windows Defender
        run: Add-MpPreference -ExclusionPath "${{ github.workspace }}"
        shell: pwsh

      - name: Run unit tests
        run: yarn run unit
        shell: pwsh
        env:
          MARKTEXT_E2E_DIAGNOSTICS: "1"
          ELECTRON_ENABLE_LOGGING: "1"
          ELECTRON_ENABLE_STACK_DUMPING: "1"
          CHROME_LOG_FILE: ${{ github.workspace }}\test-artifacts\chrome-debug.log

      - name: Pack application for Windows E2E diagnostics
        run: yarn run pack
        shell: pwsh
        env:
          MARKTEXT_E2E_DIAGNOSTICS: "1"
          ELECTRON_ENABLE_LOGGING: "1"
          ELECTRON_ENABLE_STACK_DUMPING: "1"
          CHROME_LOG_FILE: ${{ github.workspace }}\test-artifacts\chrome-debug.log

      - name: Preflight Electron launch diagnostics
        id: electron_preflight
        continue-on-error: true
        run: |
          node tools/electronPreflight.js --label "blank-launch" --timeout 30000 --runner "${{ matrix.windows_runner }}" --image-os "$env:ImageOS" --image-version "$env:ImageVersion"
        shell: pwsh
        env:
          ELECTRON_ENABLE_LOGGING: "1"
          ELECTRON_ENABLE_STACK_DUMPING: "1"

      - name: Run Playwright E2E tests
        run: |
          npx playwright test -c test/e2e/playwright.config.js test/e2e
        shell: pwsh
        env:
          MARKTEXT_EXIT_ON_ERROR: "1"
          MARKTEXT_E2E_DIAGNOSTICS: "1"
          ELECTRON_ENABLE_LOGGING: "1"
          ELECTRON_ENABLE_STACK_DUMPING: "1"
          CHROME_LOG_FILE: ${{ github.workspace }}\test-artifacts\chrome-debug.log

      - name: Upload Windows E2E diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-e2e-diagnostics-${{ matrix.windows_runner }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: test-artifacts/**
          if-no-files-found: warn

      - name: Build
        run: yarn build:bin
